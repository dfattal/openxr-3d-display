  # Bundle all test apps into a single artifact with per-app subfolders
  BundleTestApps:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    needs: [TestAppCubeHandleD3D11, TestAppCubeHostedD3D11, TestAppCubeHandleD3D12, TestAppCubeHandleGL, TestAppCubeHandleVK, TestAppGaussianSplattingVK, TestAppSpatialOS, TestAppCubeTextureD3D11, TestAppCubeHostedLegacyD3D11, TestAppCubeHostedLegacyD3D12, TestAppCubeHostedLegacyVK, TestAppCubeHostedLegacyGL]

    steps:
      - name: Download cube test app artifacts
        uses: actions/download-artifact@v4
        with:
          path: TestApps
          pattern: Cube*

      - name: Download 3DGS demo artifacts
        uses: actions/download-artifact@v4
        with:
          path: TestApps
          pattern: GaussianSplatting*

      - name: Download SpatialOS artifact
        uses: actions/download-artifact@v4
        with:
          path: TestApps
          pattern: SpatialOS

      - name: List bundled contents
        run: |
          echo "Bundled test apps:"
          find TestApps -type f | sort

      - name: Upload bundled test apps
        uses: actions/upload-artifact@v4
        with:
          name: TestApps-${{ github.run_number }}
          if-no-files-found: error
          path: TestApps

      - name: Delete individual test app artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          failOnError: false
          name: |
            CubeHandleD3D11
            CubeHostedD3D11
            CubeHandleD3D12
            CubeHandleGL
            CubeHandleVK
            CubeTextureD3D11
            CubeHostedLegacyD3D11
            CubeHostedLegacyD3D12
            CubeHostedLegacyVK
            CubeHostedLegacyGL
            GaussianSplattingVK
            SpatialOS

      - name: Install rclone
        run: |
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.zip
          unzip rclone-current-linux-amd64.zip
          sudo cp rclone-*-linux-amd64/rclone /usr/local/bin/
          rclone --version

      - name: Setup rclone config
        env:
          RCLONE_CONFIG_CONTENTS: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_CONTENTS" > ~/.config/rclone/rclone.conf

      - name: Zip test apps
        run: |
          cd TestApps
          zip -r ../TestApps-${{ github.run_number }}.zip .
          cd ..
          ls -lh TestApps-${{ github.run_number }}.zip

      - name: Upload test apps zip to OneDrive
        run: |
          destPath="SANDBOX/RUNTIMES + SDK + PLUGINS/OpenXR"
          echo "Uploading TestApps-${{ github.run_number }}.zip to OneDrive: $destPath"
          rclone copy TestApps-${{ github.run_number }}.zip "onedrive:$destPath" --progress
          echo "Upload complete!"
