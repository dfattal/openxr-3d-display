name: Build Windows

on:
  push:
    branches:
      - main
      - '*with-ci-build'
      - 'XR_EXT_session_target' 
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  Runtime:
    runs-on: windows-2022

    env:
      SLACK_WEBHOOK_URL: https://hooks.slack.com/services/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
      SR_TAG: 1.35.0.2011
      GH_TOKEN: ${{ secrets.LEIALOFT_GITHUB_TOKEN }}

    steps:
    
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.LEIALOFT_GITHUB_TOKEN }}
          submodules: recursive
          lfs: true

      - name: Download Simulated Reality SDK
        run: |
          gh release download -R LeiaInc/SR-SDK-Windows-Releases-Internal-Public $env:SR_TAG -p LeiaSR-SDK-$env:SR_TAG-win64.zip -D .
          tar -xf LeiaSR-SDK-$env:SR_TAG-win64.zip -C .
          Get-ChildItem -Recurse LeiaSR-SDK-$env:SR_TAG-win64
          gh release download -R LeiaInc/SR-SDK-Windows-Releases-Internal-Public $env:SR_TAG -p SimulatedRealityVulkanBeta.lib -D LeiaSR-SDK-$env:SR_TAG-win64/lib
          gh release download -R LeiaInc/SR-SDK-Windows-Releases-Internal-Public $env:SR_TAG -p vkweaver.h -D LeiaSR-SDK-$env:SR_TAG-win64/include/sr/weaver

      - name: Restore from cache and setup vcpkg executable and data files.
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '5d90b0d5d0317336e65662f2bf0d671b0902c632'
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.283.0
          cache: true

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Generate
        env:
          LEIASR_SDKROOT: ${{ github.workspace }}/LeiaSR-SDK-${{ env.SR_TAG }}-win64
        run: |
          cmake -S . -B build -G "Ninja Multi-Config" `
            -DXRT_HAVE_LEIA_SR=ON `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/LeiaSR-SDK-$env:SR_TAG-win64" `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DX_VCPKG_APPLOCAL_DEPS_INSTALL=ON `
            -DCMAKE_INSTALL_PREFIX=_package `
            -DXRT_BUILD_INSTALLER=ON `
            -DXRT_FEATURE_SERVICE=ON `
            -DXRT_FEATURE_HYBRID_MODE=ON `
            -DBUILD_NUM="${{ github.run_number }}"

      - name: Build
        run: cmake --build build --config Release --target install

      - name: Build Installer                                                                                                                                                                                                                                                                                     
        run: cmake --build build --config Release --target installer

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        id: artifact-upload-step
        with:
          name: SRMonado
          if-no-files-found: error
          path: _package

      - name: Upload installer
        uses: actions/upload-artifact@v4
        id: installer-upload-step
        with:
          name: SRMonado-Installer
          if-no-files-found: error
          path: _package/SRMonadoSetup-*.exe

      # - name: Create GitHub Release
      #   if: startsWith(github.ref, 'refs/tags/')
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     files: Runtime/Installer/*.exe

      # - name: Upload to Zealot
      #   if: startsWith(github.ref, 'refs/tags/')
      #   env:
      #     ZEALOT_API_TOKEN: ${{ secrets.ZEALOT_API_TOKEN }}
      #     ZEALOT_CHANNEL_ID: ${{ secrets.ZEALOT_CHANNEL_ID }}
      #   run: |
      #     $exePath = Get-ChildItem "Runtime/Installer/*.exe" | Select-Object -First 1
      #     Write-Output "Installer file path: $exePath"
      #     if ($exePath -and $exePath.Name -match 'SRMonado-(\d+\.\d+\.\d+)\.([^.]+)\.exe') {
      #         $version = $matches[1]
      #         $fileCommit = $matches[2]
      #         Write-Output "Parsed file version: $version"
      #         Write-Output "Parsed file commit: $fileCommit"
      #     } else {
      #         Write-Output "Version or build not found in file name."
      #     }
      #     $token = $env:ZEALOT_API_TOKEN
      #     $channel_key = $env:ZEALOT_CHANNEL_ID

      #     # Get dynamic values
      #     $commit=$(git rev-parse --short HEAD)
      #     $log=Get-Content changelog.txt -Raw
          
      #     curl.exe -X POST "https://zealot.leiapix.com/api/apps/upload" `
      #       -F "token=$token" `
      #       -F "file=@$($exePath.FullName)" `
      #       -F "device_type=windows" `
      #       -F "app_name=SRMonado" `
      #       -F "release_version=$version" `
      #       -F "build_version=$commit" `
      #       -F "branch=${{ github.ref_name }}" `
      #       -F "git_commit=$commit" `
      #       -F "channel_key=$channel_key" `
      #       -F "changelog=$log"

      #     Write-Output "Upload complete."

      - name: Setup rclone config
        shell: powershell
        run: |
          $rcloneDir = "$env:USERPROFILE\.config\rclone"
          if (-not (Test-Path $rcloneDir)) {
            New-Item -ItemType Directory -Path $rcloneDir -Force
          }
          $configContent = @"
          ${{ secrets.RCLONE_CONFIG }}
          "@
          Set-Content -Path "$rcloneDir\rclone.conf" -Value $configContent
          Write-Host "rclone config written to $rcloneDir\rclone.conf"

      - name: Install rclone (if not present)
        shell: powershell
        run: |
          if (-not (Get-Command rclone -ErrorAction SilentlyContinue)) {
            Write-Host "Installing rclone..."
            Invoke-WebRequest -Uri "https://downloads.rclone.org/rclone-current-windows-amd64.zip" -OutFile "rclone.zip"
            Expand-Archive -Path "rclone.zip" -DestinationPath "rclone_temp" -Force
            $rcloneExe = Get-ChildItem -Path "rclone_temp" -Recurse -Filter "rclone.exe" | Select-Object -First 1
            Copy-Item $rcloneExe.FullName -Destination "C:\Windows\System32\rclone.exe"
            Write-Host "rclone installed successfully"
          } else {
            Write-Host "rclone already installed"
          }

      - name: Upload installer to OneDrive
        shell: powershell
        run: |
          $installer = Get-ChildItem -Path "_package/SRMonadoSetup-*.exe" | Select-Object -First 1
          $destPath = "SANDBOX/RUNTIMES + SDK + PLUGINS/OpenXR"
          Write-Host "Uploading $($installer.Name) to OneDrive: $destPath"
          rclone copy $installer.FullName "onedrive:$destPath" --progress
          Write-Host "Upload complete!"

      - name: Post build to Slack
        if: success() && !contains(github.event.head_commit.message, '[skip slack]')
        uses: act10ns/slack@v2
        with:
          status: starting
          message: ':thumbsup: ${{ github.event.head_commit.message }}

            READY

            ${{ steps.installer-upload-step.outputs.artifact-url }}'

      - name: Post failure to Slack
        if: failure() && !contains(github.event.head_commit.message, '[skip slack]')
        uses: act10ns/slack@v2
        with:
          status: starting

          message: ':thumbsdown: ${{ github.event.head_commit.message }}

            FAILED

            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'

  # Test app build (D3D11 with XR_EXT_session_target) - toggle by changing 'if: false' to 'if: true'
  TestAppSessionTarget:
    if: true  # <-- Change to 'false' to disable test app build
    runs-on: windows-2022
    needs: Runtime  # Wait for runtime build to get artifacts

    env:
      GH_TOKEN: ${{ secrets.LEIALOFT_GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.LEIALOFT_GITHUB_TOKEN }}
          submodules: recursive

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          name: SRMonado
          path: runtime

      - name: List runtime artifacts
        run: |
          Write-Host "Runtime directory contents:"
          Get-ChildItem -Recurse runtime | Select-Object FullName

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install OpenXR loader
        run: |
          # Download and extract OpenXR SDK
          $openxrVersion = "1.1.38"
          $openxrUrl = "https://github.com/KhronosGroup/OpenXR-SDK-Source/releases/download/release-$openxrVersion/openxr_loader_windows-$openxrVersion.zip"
          Write-Host "Downloading OpenXR loader from $openxrUrl"
          Invoke-WebRequest -Uri $openxrUrl -OutFile openxr_loader.zip
          Expand-Archive -Path openxr_loader.zip -DestinationPath openxr_sdk -Force
          Write-Host "OpenXR SDK contents:"
          Get-ChildItem -Recurse openxr_sdk | Select-Object FullName

      - name: Build test app (sr_cube_openxr_ext)
        run: |
          cd test_apps/sr_cube_openxr_ext
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DOpenXR_ROOT="${{ github.workspace }}/openxr_sdk"
          cmake --build build

      - name: Copy required DLLs to test app build
        run: |
          # Explicitly use the x64 OpenXR loader DLL
          $loaderDll = Get-ChildItem -Path openxr_sdk -Recurse -Filter "openxr_loader.dll" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          if (-not $loaderDll) {
            # Fallback to any loader if x64 path not found
            $loaderDll = Get-ChildItem -Path openxr_sdk -Recurse -Filter "openxr_loader.dll" | Select-Object -First 1
          }
          if ($loaderDll) {
            Copy-Item $loaderDll.FullName -Destination test_apps/sr_cube_openxr_ext/build/
            Write-Host "Copied $($loaderDll.FullName) to test app build"
          } else {
            Write-Host "Warning: openxr_loader.dll not found"
          }

          # NOTE: D3DCompiler_47.dll is a Windows system component available since Win8.
          # We do NOT bundle it - the app will use the system version.
          # Bundling caused 0xc000007b errors on some systems.
          Write-Host "Not bundling D3DCompiler_47.dll - will use system version"

      - name: Verify binary architectures
        run: |
          Write-Host "=== Checking binary architectures ==="
          $exe = "test_apps/sr_cube_openxr_ext/build/sr_cube_openxr_ext.exe"
          $dll = "test_apps/sr_cube_openxr_ext/build/openxr_loader.dll"

          Write-Host "`nEXE architecture:"
          dumpbin /headers $exe | Select-String -Pattern "machine \(|File Type:"

          Write-Host "`nDLL architecture:"
          dumpbin /headers $dll | Select-String -Pattern "machine \(|File Type:"

          Write-Host "`nDependencies of EXE:"
          dumpbin /dependents $exe

          Write-Host "`nDependencies of openxr_loader.dll:"
          dumpbin /dependents $dll

          Write-Host "`nAll DLLs in build directory:"
          Get-ChildItem test_apps/sr_cube_openxr_ext/build/*.dll | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Upload test app
        uses: actions/upload-artifact@v4
        with:
          name: SRCubeOpenXRExt
          if-no-files-found: error
          path: |
            test_apps/sr_cube_openxr_ext/build/sr_cube_openxr_ext.exe
            test_apps/sr_cube_openxr_ext/build/*.dll
            test_apps/sr_cube_openxr_ext/build/textures/

