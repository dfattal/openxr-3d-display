            test_apps/sr_cube_openxr_ext_gl/build/sr_cube_openxr_ext_gl.exe
            test_apps/sr_cube_openxr_ext_gl/build/*.dll
            test_apps/sr_cube_openxr_ext_gl/build/textures/

  # Vulkan test app with XR_EXT_session_target (requires Vulkan SDK)
  TestAppVulkan:
    if: true  # <-- Change to 'false' to disable
    runs-on: windows-2022
    needs: Runtime

    env:
      GH_TOKEN: ${{ secrets.LEIALOFT_GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.LEIALOFT_GITHUB_TOKEN }}
          submodules: recursive

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          name: SRMonado
          path: runtime

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.283.0
          cache: true

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install OpenXR loader
        run: |
          $openxrVersion = "1.1.38"
          $openxrUrl = "https://github.com/KhronosGroup/OpenXR-SDK-Source/releases/download/release-$openxrVersion/openxr_loader_windows-$openxrVersion.zip"
          Invoke-WebRequest -Uri $openxrUrl -OutFile openxr_loader.zip
          Expand-Archive -Path openxr_loader.zip -DestinationPath openxr_sdk -Force

      - name: Build Vulkan test app (sr_cube_openxr_ext_vk)
        run: |
          cd test_apps/sr_cube_openxr_ext_vk
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DOpenXR_ROOT="${{ github.workspace }}/openxr_sdk"
          cmake --build build

      - name: Copy required DLLs
        run: |
          $loaderDll = Get-ChildItem -Path openxr_sdk -Recurse -Filter "openxr_loader.dll" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          if (-not $loaderDll) {
            $loaderDll = Get-ChildItem -Path openxr_sdk -Recurse -Filter "openxr_loader.dll" | Select-Object -First 1
          }
          if ($loaderDll) {
            Copy-Item $loaderDll.FullName -Destination test_apps/sr_cube_openxr_ext_vk/build/
          }

      - name: Upload Vulkan test app
        uses: actions/upload-artifact@v4
        with:
          name: SRCubeOpenXRExtVK
          if-no-files-found: error
          path: |
            test_apps/sr_cube_openxr_ext_vk/build/sr_cube_openxr_ext_vk.exe
            test_apps/sr_cube_openxr_ext_vk/build/*.dll
            test_apps/sr_cube_openxr_ext_vk/build/textures/

  # Bundle all test apps into a single artifact with per-app subfolders
  BundleTestApps:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    needs: [TestAppSessionTarget, TestAppNative, TestAppNativeVulkan, TestAppStandard, TestAppD3D12, TestAppOpenGL, TestAppVulkan]

    steps:
      - name: Download all test app artifacts
        uses: actions/download-artifact@v4
        with:
          path: TestApps
          pattern: SRCube*

      - name: List bundled contents
        run: |
          echo "Bundled test apps:"
          find TestApps -type f | sort

      - name: Upload bundled test apps
        uses: actions/upload-artifact@v4
        with:
          name: SRTestApps-${{ github.run_number }}
          if-no-files-found: error
          path: TestApps

      - name: Delete individual test app artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          failOnError: false
          name: |
            SRCubeOpenXRExt
            SRCubeNative
            SRCubeNativeVK
            SRCubeOpenXR
            SRCubeOpenXRExtD3D12
            SRCubeOpenXRExtGL
            SRCubeOpenXRExtVK

      - name: Install rclone
        run: |
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.zip
          unzip rclone-current-linux-amd64.zip
          sudo cp rclone-*-linux-amd64/rclone /usr/local/bin/
          rclone --version

      - name: Setup rclone config
        env:
          RCLONE_CONFIG_CONTENTS: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_CONTENTS" > ~/.config/rclone/rclone.conf

      - name: Zip test apps
        run: |
          cd TestApps
          zip -r ../SRTestApps-${{ github.run_number }}.zip .
          cd ..
          ls -lh SRTestApps-${{ github.run_number }}.zip

      - name: Upload test apps zip to OneDrive
        run: |
          destPath="SANDBOX/RUNTIMES + SDK + PLUGINS/OpenXR"
          echo "Uploading SRTestApps-${{ github.run_number }}.zip to OneDrive: $destPath"
          rclone copy SRTestApps-${{ github.run_number }}.zip "onedrive:$destPath" --progress
          echo "Upload complete!"
