name: Publish Demos

# Auto-syncs demo source code to DisplayXR/displayxr-demo on tagged releases.
# Only runs on pvt repo (has DISPLAYXR_TOKEN).

on:
  push:
    tags: ['v*']

jobs:
  sync-demos:
    if: github.repository == 'DisplayXR/displayxr-runtime-pvt'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout runtime repo
        uses: actions/checkout@v4

      - name: Clone demo repo
        run: |
          GIT_LFS_SKIP_SMUDGE=1 git clone https://x-access-token:${{ secrets.DISPLAYXR_TOKEN }}@github.com/DisplayXR/displayxr-demos.git demo-repo

      - name: Sync source files
        run: |
          # Sync demo sources
          rsync -av --delete --exclude='build/' demos/gaussian_splatting_handle_vk_macos/ demo-repo/gaussian_splatting/macos/
          rsync -av --delete --exclude='build/' demos/gaussian_splatting_handle_vk_win/ demo-repo/gaussian_splatting/windows/
          rsync -av --delete --exclude='build/' demos/3dgs_common/ demo-repo/gaussian_splatting/3dgs_common/
          rsync -av --delete --exclude='build/' demos/spatial_os_handle_d3d11_win/ demo-repo/spatial_os/windows/

          # Sync common code (exclude build artifacts and textures)
          rsync -av --delete --exclude='build/' --exclude='textures/' --exclude='SimulatedRealityVulkanBeta.dll' test_apps/common/ demo-repo/common/

          # Sync extension headers
          mkdir -p demo-repo/include/openxr
          cp src/external/openxr_includes/openxr/XR_EXT_*.h demo-repo/include/openxr/

          echo "Sync complete"

      - name: Commit and push if changed
        working-directory: demo-repo
        run: |
          git config user.name "DisplayXR Bot"
          git config user.email "noreply@displayxr.org"
          git add -A
          if git diff --cached --quiet; then
            echo "No demo changes to publish"
          else
            git commit -m "Sync demos from displayxr-runtime ${{ github.ref_name }}"
            git push
            git tag "${{ github.ref_name }}"
            git push origin "${{ github.ref_name }}"
            echo "Published demos with tag ${{ github.ref_name }}"
          fi
