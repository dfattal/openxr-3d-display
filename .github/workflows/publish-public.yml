name: Publish to Public Repos

# On tagged releases: push runtime (sans shell) to displayxr-runtime (public),
# and publish combined installer + shell binary to displayxr-shell-releases.

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  actions: read

jobs:
  publish-runtime:
    if: github.repository == 'DisplayXR/displayxr-runtime-pvt'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove shell code (proprietary)
        run: |
          rm -rf src/xrt/targets/shell/
          # Remove CMake reference to shell subdirectory
          sed -i '/# DisplayXR spatial shell/,/endif()/d' src/xrt/targets/CMakeLists.txt
          echo "Removed src/xrt/targets/shell/ and CMake reference"

      - name: Push to public runtime repo
        env:
          DISPLAYXR_TOKEN: ${{ secrets.DISPLAYXR_TOKEN }}
        run: |
          if [ -z "$DISPLAYXR_TOKEN" ]; then
            echo "::error::DISPLAYXR_TOKEN secret is empty or not set"
            exit 1
          fi
          echo "Token is set (length: ${#DISPLAYXR_TOKEN})"

          git config user.name "DisplayXR Bot"
          git config user.email "noreply@displayxr.org"

          # Stage the deletion
          git add -A
          git commit -m "Release ${{ github.ref_name }} (shell code excluded)" --allow-empty

          # Push to public repo
          git remote add public "https://x-access-token:${DISPLAYXR_TOKEN}@github.com/DisplayXR/displayxr-runtime.git"
          git push public HEAD:main --force

          # Push the tag
          git tag -f "${{ github.ref_name }}"
          git push public "${{ github.ref_name }}" --force

          echo "Published ${{ github.ref_name }} to DisplayXR/displayxr-runtime"

      - name: Create GitHub Release on public runtime repo
        env:
          GH_TOKEN: ${{ secrets.DISPLAYXR_TOKEN }}
        run: |
          # Generate release notes from commits since last tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --oneline "$PREV_TAG".."${{ github.ref_name }}" --no-merges | head -50)
          else
            NOTES="Initial release"
          fi

          gh release create "${{ github.ref_name }}" \
            --repo DisplayXR/displayxr-runtime \
            --title "DisplayXR Runtime ${{ github.ref_name }}" \
            --notes "## What's New

          $NOTES

          ## Installation

          Download the installer from [DisplayXR Shell Releases](https://github.com/DisplayXR/displayxr-shell-releases/releases/tag/${{ github.ref_name }}) or build from source.

          ## License

          Boost Software License 1.0 (BSL-1.0)" \
            --latest

          echo "Created release on DisplayXR/displayxr-runtime"

  publish-shell-releases:
    if: github.repository == 'DisplayXR/displayxr-runtime-pvt'
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Windows CI build to complete
        id: wait-build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for Build Windows workflow to complete for tag ${{ github.ref_name }}..."
          RUN_ID=""
          for i in $(seq 1 60); do
            # Find successful build-windows run for this commit
            RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow build-windows.yml \
              --event push --limit 10 --json databaseId,conclusion,headSha \
              --jq "[.[] | select(.headSha == \"${{ github.sha }}\" and .conclusion == \"success\") | .databaseId] | first // empty" 2>/dev/null)
            if [ -n "$RUN_ID" ]; then
              echo "Build Windows completed successfully: run $RUN_ID"
              echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
              break
            fi
            echo "  Attempt $i/60 — waiting 30s..."
            sleep 30
          done

          if [ -z "$RUN_ID" ]; then
            echo "::error::Build Windows did not complete successfully within 30 minutes"
            exit 1
          fi

      - name: Download DisplayXR artifact from Windows CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${{ steps.wait-build.outputs.run_id }}" --repo ${{ github.repository }} --name DisplayXR --dir runtime
          echo "Downloaded DisplayXR artifact"
          ls -la runtime/bin/ || echo "No bin directory"
          ls -la runtime/ | head -20

      - name: Find installer and shell binary
        id: find-files
        run: |
          # Find installer
          INSTALLER=$(find runtime -name "DisplayXRSetup-*.exe" -type f | head -1)
          if [ -n "$INSTALLER" ]; then
            echo "installer=$INSTALLER" >> "$GITHUB_OUTPUT"
            echo "Found installer: $INSTALLER"
          else
            echo "::warning::Installer not found in artifacts"
          fi

          # Find shell binary
          SHELL_EXE=$(find runtime -name "displayxr-shell.exe" -type f | head -1)
          if [ -n "$SHELL_EXE" ]; then
            echo "shell=$SHELL_EXE" >> "$GITHUB_OUTPUT"
            echo "Found shell: $SHELL_EXE"
          else
            echo "::warning::Shell binary not found in artifacts"
          fi

      - name: Create GitHub Release on displayxr-shell-releases
        env:
          GH_TOKEN: ${{ secrets.DISPLAYXR_TOKEN }}
        run: |
          # Build asset list
          ASSETS=""
          if [ -n "${{ steps.find-files.outputs.installer }}" ]; then
            ASSETS="$ASSETS ${{ steps.find-files.outputs.installer }}"
          fi
          if [ -n "${{ steps.find-files.outputs.shell }}" ]; then
            ASSETS="$ASSETS ${{ steps.find-files.outputs.shell }}"
          fi

          if [ -z "$ASSETS" ]; then
            echo "::error::No assets found to publish"
            exit 1
          fi

          gh release create "${{ github.ref_name }}" \
            --repo DisplayXR/displayxr-shell-releases \
            --title "DisplayXR ${{ github.ref_name }}" \
            --notes "## Downloads

          | File | Description |
          |------|-------------|
          | \`DisplayXRSetup-*.exe\` | **Installer** — installs runtime + shell + service. Recommended for most users. |
          | \`displayxr-shell.exe\` | **Standalone shell** — for manual updates. Requires runtime already installed. |

          ## License

          - **DisplayXR Runtime** (DLLs, service): [Boost Software License 1.0](https://github.com/DisplayXR/displayxr-runtime/blob/main/LICENSE)
          - **DisplayXR Shell** (shell exe): Proprietary — free for personal/non-commercial use

          ## Links

          - [Runtime source & docs](https://github.com/DisplayXR/displayxr-runtime/releases/tag/${{ github.ref_name }})
          - [Full documentation](https://github.com/DisplayXR/displayxr-runtime)" \
            --latest \
            $ASSETS

          echo "Published ${{ github.ref_name }} to DisplayXR/displayxr-shell-releases"
